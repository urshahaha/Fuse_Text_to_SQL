services:
  db:
    image: postgres:16
    container_name: textsql_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: textsql
    ports:
      - "5433:5432"
    volumes:
      - ./data/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d textsql"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: textsql_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/textsql
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports

volumes:
  pgdata:
